spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:dev-db.example.com}:${DB_PORT:5432}/${DB_NAME:dev}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  flyway:
    enabled: true
    out-of-order: true
  
  data:
    redis:
      host: ${REDIS_HOST:dev-redis.example.com}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.project.exe: INFO
    org.springframework.security: INFO
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Development Environment Settings
dev:
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:https://dev.example.com}"
  auth:
    jwk-set-uri: "${AUTH_SERVER_JWK_URI:http://dev-auth.example.com:8081/.well-known/jwks.json}"

# Resilience4j - More lenient for dev
resilience4j:
  circuitbreaker:
    instances:
      default:
        failureRateThreshold: 60
        waitDurationInOpenState: 5s

