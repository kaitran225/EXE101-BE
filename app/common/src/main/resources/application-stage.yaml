spring:
  config:
    activate:
      on-profile: stage
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:stage-db.example.com}:${DB_PORT:5432}/${DB_NAME:stage}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  flyway:
    enabled: true
    out-of-order: false
  
  data:
    redis:
      host: ${REDIS_HOST:stage-redis.example.com}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true

logging:
  level:
    root: WARN
    com.project.exe: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Staging Environment Settings
stage:
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:https://stage.example.com}"
  auth:
    jwk-set-uri: "${AUTH_SERVER_JWK_URI:http://stage-auth.example.com:8081/.well-known/jwks.json}"

# Resilience4j - Production-like settings
resilience4j:
  circuitbreaker:
    instances:
      default:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 20

