spring:
  config:
    activate-on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      idle-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
  jwt:
    expiration: ${JWT_EXPIRATION:3600}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800}

ai:
  provider: ${AI_PROVIDER:gemini}
  model: ${AI_MODEL:gemini-2.0-flash}
  api-key: ${AI_API_KEY}
  base-url: ${AI_BASE_URL:https://generativelanguage.googleapis.com}
  enabled: ${AI_ENABLED:true}

logging:
  level:
    org.springframework.security: WARN
