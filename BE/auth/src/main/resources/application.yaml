spring:
  application:
    name: exe101-auth
  profiles:
    active: local

# Must match JWT `iss` and resource servers’ AUTH_ISSUER_URI (no trailing slash).
auth:
  issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8081}

server:
  port: 8081
  shutdown: graceful
  undertow:
    accesslog:
      enabled: ${UNDERTOW_ACCESSLOG_ENABLED:false}
      pattern: ${UNDERTOW_ACCESSLOG_PATTERN:%h %l %u %t \"%r\" %s %b}
    threads:
      io: ${UNDERTOW_IO_THREADS:4}
      worker: ${UNDERTOW_WORKER_THREADS:32}
    max-http-post-size: ${UNDERTOW_MAX_HTTP_POST_SIZE:10485760}

# OAuth2 Authorization Server (reference; issuer is wired from auth.issuer-uri in Java config)
spring.security.oauth2.authorizationserver:
  issuer: ${AUTH_ISSUER_URI:http://localhost:8081}
  endpoint:
    authorization-uri: http://localhost:8081/oauth2/authorize
    token-uri: http://localhost:8081/oauth2/token
    jwk-set-uri: http://localhost:8081/oauth2/jwks
  client:
    exe101-web:
      registration:
        client-id: exe101-web
        client-secret: secret
        client-authentication-methods:
          - client_secret_basic
        authorization-grant-types:
          - authorization_code
          - refresh_token
        redirect-uris:
          - http://localhost:5173/callback
          - http://localhost:5173
        scopes:
          - openid
          - read
          - write