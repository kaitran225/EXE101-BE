spring:
  application:
    name: exe101-common
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Lightweight AI (Gemini 2.0 Flash). Override in service profiles.
ai:
  provider: gemini
  model: gemini-2.0-flash
  api-key: ${AI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com
  enabled: true

logging:
  level:
    org.springframework.security: INFO
