spring:
  application:
    name: exe101-read
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/read
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083

# Validate JWT from auth service
spring.security.oauth2.resourceserver.jwt:
  issuer-uri: http://localhost:8081
  jwk-set-uri: http://localhost:8081/oauth2/jwks

---
spring:
  config:
    activate-on-profile: local
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/read
